#----------------------------------#
#          GLOBAL CONFIGS          #
#----------------------------------#
#
set -g mouse on


#----------------------------------#
#          STATUSBAR CONFIGS       #
#----------------------------------#
#
# Mørkere grønn bakgrunn (colour22 = dyp grønn)
set -g status-style "bg=colour22"
set -g status-left-style "bg=colour22"
set -g status-right-style "bg=colour22"
#
# Todeling (ingen midtstripe)
set -g status-left-length 100
set -g status-right-length 100
#
# Venstre seksjon (beholder dine symboler)
set -g pane-border-format ""
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""
set -g window-status-style "fg=default,bg=default"
set -g window-status-current-style "fg=default,bg=default"
set -g status-left "#{?client_prefix,◉,○} | ses:#{session_name} | win:#{window_index} | pnl:#{pane_index} | mode:#{?pane_in_mode,copy,normal}"
#
# Høyre seksjon (dynamisk lengde + klokke)
set -g status-right "%H:%M"


#---------------------------------------#
#          GLOBAL SHORTCUTKEYS          #
#---------------------------------------#
#
# sett tastekombinasjon som er prefix
set-option -g prefix C-b
# reload config filen = prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"


#-------------------------------------#
#          PANE SHORTCUTKEYS          #
#-------------------------------------#
#
# split vertikal/lodrett = prefix + |
bind-key | split-window -h
# split horisontal/vannrett = prefix + -
bind-key - split-window -v


#-------------------------------------#
#          CYCLE SHORTCUTKEYS         #
#-------------------------------------#
#
# panels | next = alt + n | previous = alt + p
bind-key -n M-n select-pane -t :.+
bind-key -n M-p select-pane -t :.-
# windows | next = alt + shift + n | previous = alt + shift + p
bind-key -n M-N next-window
bind-key -n M-P previous-window
# sessions | next = alt + ctrl + n | previous = alt + ctrl + p
bind-key -n M-C-n switch-client -n
bind-key -n M-C-p switch-client -p


# ---------------------------------- #
# ------------ PLUGINS ------------- #
# ---------------------------------- #
#
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
# prefix + ctrl + s : save/lagre manuelt
# prefix + ctrl + r : reload/gjenopprett manuelt


#-------------------------------#
#          NYTTIG INFO          #
#-------------------------------#
#
# C = CTRL
# M = ALT
# S = SHIFT
# prefix = en forhåndsbestemt tastekombinasjon
#
# Tastekombinasjonsmuligheter
# CTRL + SHIFT
# CTRL + ALT
# SHIFT + ALT
# CTRL + SHIFT + ALT
#
# Det er forskjell på "bind" og "bind-key" og "bind -n".
# bind     = brukes til å knytte en tast til en kommando, f.eks. "bind C-a xxxxxx" gjør at tastekombinasjon CTRL + A settes til å gjøre noe.
# bind-key = brukes til å knytte en tast til prefix bindingen, f.eks. "bind-key r xxxx" blir trigget når prefix + r blir trykket.
# bind -n  = brukes til å knytte en tast og samtidig si at du ikke skal bruke prefix
#
# Må finne ut forskjellen på set / set-option
#
